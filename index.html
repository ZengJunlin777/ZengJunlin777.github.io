<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多彩高颜值 - AI 个人工作流</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自定义滚动条和动画 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body {
            /* 柔和的多彩渐变背景 */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-image: radial-gradient(at 40% 20%, hsla(28,100%,74%,0.15) 0px, transparent 50%),
                              radial-gradient(at 80% 0%, hsla(189,100%,56%,0.15) 0px, transparent 50%),
                              radial-gradient(at 0% 50%, hsla(355,100%,93%,0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .step-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .step-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .animated-gradient-text {
            background: linear-gradient(to right, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 3s ease infinite;
            background-size: 200% 200%;
        }
        @keyframes gradientMove { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
    </style>
</head>
<body class="text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-white/70 backdrop-blur-md border-b border-white/50 shadow-sm py-4 px-8 flex justify-between items-center z-20 sticky top-0">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-blue-500 to-purple-500 text-white p-2.5 rounded-xl shadow-lg shadow-purple-500/30">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight animated-gradient-text">FlowMagic</h1>
        </div>
        <div>
            <button onclick="runWorkflow()" class="bg-gradient-to-r from-gray-900 to-gray-800 hover:from-black hover:to-gray-900 text-white px-8 py-2.5 rounded-full font-semibold shadow-xl shadow-gray-900/20 transition-all hover:scale-105 flex items-center gap-2">
                <i class="fa-solid fa-play text-xs text-green-400"></i> 一键运行工作流
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <div class="w-1/2 p-8 overflow-y-auto relative">
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">SOP 编排</h2>
                    <p class="text-sm text-gray-500 mt-1">按顺序拼接你的 AI 积木</p>
                </div>
                <button onclick="addStep()" class="bg-white/80 hover:bg-white text-blue-600 border border-blue-200 shadow-sm px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 transition-all hover:shadow-md">
                    <i class="fa-solid fa-plus"></i> 新增节点
                </button>
            </div>
            
            <div id="workflow-container" class="space-y-2 relative pb-20">
                </div>
        </div>

        <div class="w-1/2 p-8 overflow-y-auto flex flex-col">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">运行终端</h2>
            
            <div class="flex-1 flex flex-col rounded-2xl overflow-hidden shadow-2xl bg-[#0f172a] border border-slate-700/50">
                <div class="bg-slate-800/80 backdrop-blur px-4 py-3 flex items-center gap-2 border-b border-slate-700/50">
                    <div class="w-3.5 h-3.5 rounded-full bg-red-500/90 shadow-inner"></div>
                    <div class="w-3.5 h-3.5 rounded-full bg-yellow-500/90 shadow-inner"></div>
                    <div class="w-3.5 h-3.5 rounded-full bg-green-500/90 shadow-inner"></div>
                    <span class="ml-4 text-xs text-slate-400 font-mono tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-terminal text-slate-500"></i> bash - output
                    </span>
                </div>
                <div id="output-console" class="p-6 text-slate-300 font-mono text-[13px] flex-1 overflow-y-auto space-y-4 leading-relaxed">
                    <div class="text-slate-500">
                        <span class="text-green-400 font-bold">system@flow-magic</span>:<span class="text-blue-400">~</span>$ 初始化完毕。<br>
                        <span class="text-green-400 font-bold">system@flow-magic</span>:<span class="text-blue-400">~</span>$ 请在左侧编排节点，点击右上角运行。
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // AI 模型配置：加入了色彩主题
        const aiModels = [
            { id: 'gpt-4o', name: 'GPT-4o (逻辑推理)', icon: 'fa-brain', theme: 'emerald' },
            { id: 'claude-3-5', name: 'Claude 3.5 (长文与代码)', icon: 'fa-pen-nib', theme: 'purple' },
            { id: 'gemini-1-5', name: 'Gemini 1.5 (多模态)', icon: 'fa-sparkles', theme: 'blue' },
            { id: 'dalle-3', name: 'DALL-E 3 (AI 绘画)', icon: 'fa-image', theme: 'rose' }
        ];

        // 颜色映射表 (Tailwind Class)
        const themeMap = {
            'emerald': { border: 'border-emerald-400', bg: 'bg-emerald-50/50', text: 'text-emerald-600', badge: 'bg-emerald-100 text-emerald-700' },
            'purple': { border: 'border-purple-400', bg: 'bg-purple-50/50', text: 'text-purple-600', badge: 'bg-purple-100 text-purple-700' },
            'blue': { border: 'border-blue-400', bg: 'bg-blue-50/50', text: 'text-blue-600', badge: 'bg-blue-100 text-blue-700' },
            'rose': { border: 'border-rose-400', bg: 'bg-rose-50/50', text: 'text-rose-600', badge: 'bg-rose-100 text-rose-700' }
        };

        let steps = [
            { id: 1, prompt: '分析以下主题并生成一篇博客大纲：[人工智能的未来]', model: 'gpt-4o' }
        ];

        // 渲染工作流节点
        function renderSteps() {
            const container = document.getElementById('workflow-container');
            container.innerHTML = '';

            steps.forEach((step, index) => {
                const modelInfo = aiModels.find(m => m.id === step.model);
                const theme = themeMap[modelInfo.theme];

                const stepEl = document.createElement('div');
                // 使用选中模型的颜色主题渲染卡片
                stepEl.className = `step-card bg-white/60 border-l-4 ${theme.border} rounded-2xl p-6 shadow-lg shadow-gray-200/40 relative z-10`;
                
                let modelOptions = aiModels.map(m => 
                    `<option value="${m.id}" ${step.model === m.id ? 'selected' : ''}>${m.name}</option>`
                ).join('');

                stepEl.innerHTML = `
                    <div class="flex justify-between items-center mb-5">
                        <div class="flex items-center gap-3">
                            <span class="flex items-center justify-center w-8 h-8 rounded-full ${theme.badge} font-black shadow-sm text-sm">${index + 1}</span>
                            <div class="flex items-center gap-2">
                                <i class="fa-solid ${modelInfo.icon} ${theme.text} text-lg"></i>
                                <select onchange="updateStepModel(${step.id}, this.value)" class="bg-transparent font-bold text-gray-800 text-lg outline-none cursor-pointer appearance-none hover:text-gray-600 transition">
                                    ${modelOptions}
                                </select>
                                <i class="fa-solid fa-chevron-down text-xs text-gray-400 pointer-events-none -ml-1"></i>
                            </div>
                        </div>
                        <button onclick="removeStep(${step.id})" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-300 hover:bg-red-50 hover:text-red-500 transition-colors">
                            <i class="fa-solid fa-trash text-sm"></i>
                        </button>
                    </div>
                    
                    <div class="relative">
                        <textarea oninput="updateStepPrompt(${step.id}, this.value)" rows="3" class="w-full bg-white/80 border border-gray-200/60 text-gray-700 rounded-xl focus:ring-2 focus:ring-${modelInfo.theme}-400 focus:border-transparent block p-4 outline-none transition-all resize-none shadow-inner placeholder-gray-400 text-sm leading-relaxed" placeholder="输入提示词，例如：请根据上文提炼核心观点...">${step.prompt}</textarea>
                    </div>
                `;

                container.appendChild(stepEl);

                // 添加优美的连接线 (除了最后一个节点)
                if (index < steps.length - 1) {
                    const lineContainer = document.createElement('div');
                    lineContainer.className = 'flex justify-center py-2 relative z-0';
                    lineContainer.innerHTML = `
                        <div class="w-1 h-8 bg-gradient-to-b from-gray-300 to-gray-200 rounded-full"></div>
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-3 h-3 bg-white border-2 border-gray-300 rounded-full"></div>
                    `;
                    container.appendChild(lineContainer);
                }
            });
        }

        // 添加新步骤
        function addStep() {
            const newId = steps.length > 0 ? Math.max(...steps.map(s => s.id)) + 1 : 1;
            steps.push({
                id: newId,
                prompt: '根据上一步的输出结果，继续执行...',
                model: 'claude-3-5' // 默认添加 Claude
            });
            renderSteps();
            // 滚动到底部
            const container = document.getElementById('workflow-container').parentElement;
            setTimeout(() => container.scrollTop = container.scrollHeight, 100);
        }

        // 删除步骤
        function removeStep(id) {
            steps = steps.filter(s => s.id !== id);
            renderSteps();
        }

        // 仅更新 Prompt（防止输入时重新渲染导致失去焦点）
        function updateStepPrompt(id, value) {
            const step = steps.find(s => s.id === id);
            if (step) step.prompt = value;
        }

        // 更新模型并重新渲染（切换颜色）
        function updateStepModel(id, value) {
            const step = steps.find(s => s.id === id);
            if (step) {
                step.model = value;
                renderSteps(); // 改变模型需要重新渲染以应用新颜色
            }
        }

        // 终端打印日志
        function logToConsole(message, type = 'info') {
            const consoleEl = document.getElementById('output-console');
            const msgEl = document.createElement('div');
            
            let htmlContent = '';
            
            if (type === 'system') {
                htmlContent = `<span class="text-blue-400 font-bold">➜</span> <span class="text-gray-300 font-bold tracking-wide">${message}</span>`;
            } else if (type === 'success') {
                htmlContent = `<div class="bg-slate-800/50 border border-slate-700 rounded-lg p-3 mt-2 text-green-300">${message.replace(/\n/g, '<br/>')}</div>`;
            } else if (type === 'waiting') {
                htmlContent = `<span class="text-yellow-400 flex items-center gap-2"><i class="fa-solid fa-circle-notch fa-spin"></i> ${message}</span>`;
            } else {
                htmlContent = `<span class="text-slate-400">${message}</span>`;
            }

            msgEl.innerHTML = htmlContent;
            consoleEl.appendChild(msgEl);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            return msgEl;
        }

        // 模拟运行工作流
        async function runWorkflow() {
            if (steps.length === 0) {
                alert("请至少添加一个积木节点！");
                return;
            }

            const consoleEl = document.getElementById('output-console');
            consoleEl.innerHTML = ''; // 清空控制台
            logToConsole('启动 FlowMagic 执行引擎...', 'system');

            for (let i = 0; i < steps.length; i++) {
                const step = steps[i];
                const modelName = aiModels.find(m => m.id === step.model).name;
                
                logToConsole(`[Step ${i + 1}] 正在调用 <span class="text-pink-400">${modelName}</span>`, 'system');
                logToConsole(`Payload: "${step.prompt}"`);
                
                const loadingMsg = logToConsole(`模型思考中，请稍候...`, 'waiting');

                // 模拟 API 延迟
                await new Promise(resolve => setTimeout(resolve, Math.random() * 1500 + 1500));
                loadingMsg.remove();

                // 模拟输出
                let mockResult = '';
                if (step.model === 'dalle-3') {
                    mockResult = `>> SUCCESS: 图像已生成。\n[Image URL: https://example.com/art-${i}.png]`;
                } else if (step.model === 'claude-3-5') {
                    mockResult = `这是 Claude 的深度解析：\n1. 结构完整。\n2. 逻辑严密。\n已将数据流转至下一节点。`;
                } else {
                    mockResult = `GPT 响应内容：\n- 核心观点一\n- 核心观点二\n任务执行完毕。`;
                }

                logToConsole(mockResult, 'success');
                
                if(i < steps.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    logToConsole(`传递上下文至下一节点...`, 'system');
                }
            }

            logToConsole('✨ 所有工作流节点执行完毕！', 'system');
        }

        // 初始化
        renderSteps();
    </script>
</body>
</html>
